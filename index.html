  <style>

      background-color: #1da1f2;
      color: white;
      font-size: 18px;
      padding: 12px 24px;

      border-radius: 10px;

<body>

  <h1>ひすいのたけさんはいいぞ。</h1>

  <img src="HLMDyBHbQAA6Nwi.jpg" alt="ひすいのたけさん">

  <button id="tweetBtn">#ひすいのたけさんはいいぞ をポスト</button>

  <script>
    document.getElementById("tweetBtn").onclick = function () {
      const text = encodeURIComponent("#ひすいのたけさんはいいぞ");
      const url = encodeURIComponent("https://creative77732-afk.github.io/hisuinotake/");
      window.open(`https://x.com/intent/tweet?text=${text}&url=${url}`, "_blank");
    };
  </script>
